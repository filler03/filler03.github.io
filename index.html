<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Index</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        min-height: 100vh;
      }
      h1 {
        color: #333;
        border-bottom: 2px solid #333;
        padding-bottom: 10px;
      }
      .content-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
        margin-top: 20px;
      }
      .section {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 10px;
      }
      h2 {
        color: #555;
        margin-top: 0;
        margin-bottom: 20px;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
      li {
        margin: 10px 0;
      }
      a {
        display: inline-block;
        padding: 10px 15px;
        background-color: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: background-color 0.3s;
      }
      a:hover {
        background-color: #0056b3;
      }
      @media (max-width: 768px) {
        .content-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Game Index</h1>

    <div class="content-grid">
      <div class="left-column">
        <div class="section">
          <h2>Games</h2>
          <ul>
            <li><a href="games/basketball/basketball.html">Basketball</a></li>
            <li><a href="games/soccer/soccer.html">Soccer</a></li>
            <li><a href="games/football.html">Football</a></li>
            <li><a href="games/orbit/orbit.html">Orbit</a></li>
            <li><a href="games/orbit/orbit.html">Worms</a></li>
          </ul>
        </div>

        <div class="section" style="margin-top: 20px">
          <h2>Test</h2>
          <ul>
            <li>
              <a href="test/basketball/basketball.html">Basketball (Test)</a>
            </li>
            <li><a href="test/soccer/soccer.html">Soccer (Test)</a></li>
          </ul>
        </div>
      </div>

      <div class="right-column">
        <div class="section">
          <h2>Tools</h2>
          <ul>
            <li><a href="tools/lifeProgress.html">Life Progress Tracker</a></li>
          </ul>
        </div>
      </div>
    </div>

    <script>
      function setTimeBasedGradient() {
        const now = new Date();
        const seconds = now.getSeconds();
        const milliseconds = now.getMilliseconds();

        // Calculate total milliseconds since the minute started
        const totalMilliseconds = seconds * 1000 + milliseconds;

        // Total milliseconds in a minute
        const millisecondsInMinute = 60000;
        const minuteProgress = totalMilliseconds / millisecondsInMinute;
        const angle = minuteProgress * 360;
        document.body.style.background = `linear-gradient(${angle}deg, #B22234, #FFFFFF, #3C3B6E)`;
      }

      setTimeBasedGradient();
      setInterval(setTimeBasedGradient, 100);
    </script>
  </body>
</html>
