<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attraction Chart</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e8e6e1;
    --text-muted: #7a7d8a;
    --bar-dolled: #f0a050;
    --bar-attract: #50b0e0;
    --slider-track: #2a2d3a;
    --slider-thumb: #f0a050;
    --delight-color: #c080e0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(240, 160, 80, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(80, 176, 224, 0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 880px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 2.4rem;
    letter-spacing: -0.02em;
    margin-bottom: 0.3rem;
    background: linear-gradient(135deg, #f0a050, #e07830);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .legend {
    display: flex;
    gap: 1.8rem;
    margin-bottom: 1.5rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }

  .legend-swatch.dolled { background: var(--bar-dolled); }
  .legend-swatch.attract { background: var(--bar-attract); }

  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem 1.5rem 1rem;
    overflow: hidden;
  }

  .columns-area {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    position: relative;
    height: 500px; /* Increased height to accommodate the 800 scale */
  }

  .grid-lines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
  }

  .grid-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }

  .day-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .bars-area {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 4px;
    padding-bottom: 10px;
  }

  .bar-outer {
    width: 22px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .bar-fill {
    border-radius: 4px 4px 0 0;
    transition: height 0.3s ease-out;
    min-height: 2px;
  }

  .bar-fill.dolled { background: linear-gradient(0deg, #d06820, #f0a050); }
  .bar-fill.attract { background: linear-gradient(0deg, #2878a0, #50b0e0); }

  .day-label {
    font-weight: 700;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    padding: 1rem 0 0.5rem;
  }

  .slider-wrapper {
    height: 120px;
    width: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  input[type="range"].day-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100px;
    height: 6px;
    background: var(--slider-track);
    border-radius: 3px;
    outline: none;
    transform: rotate(-90deg);
    cursor: pointer;
  }

  input[type="range"].day-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--slider-thumb);
    cursor: pointer;
  }

  .delight-area {
    margin-top: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .delight-label {
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--delight-color);
    min-width: 180px;
  }

  input[type="range"].delight-slider {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 6px;
    background: var(--slider-track);
    border-radius: 3px;
    outline: none;
  }

  input[type="range"].delight-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--delight-color);
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Attraction Chart</h1>
  <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 1.5rem; font-style: italic;">* the comfort level relates to how willing we are to actively seek to bless each other</p>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch dolled"></div><span>Attempt to Impress</span></div>
    <div class="legend-item"><div class="legend-swatch attract"></div><span>Attractiveness</span></div>
  </div>

  <div class="chart-wrapper">
    <div class="columns-area" id="columnsArea">
      <div class="grid-lines" id="gridLines"></div>
    </div>
  </div>

  <div class="delight-area">
    <div class="delight-label">Comfort / Connection: <span id="delightValue">0</span></div>
    <input type="range" class="delight-slider" min="-200" max="200" value="0" id="delightSlider" />
  </div>
</div>

<script>
  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const MAX_INPUT = 200;
  const CHART_MAX = 800; // Fixed scale increased to 800
  const values = [0, 0, 0, 0, 0, 0, 0];
  let delightLevel = 0;

  function calculateValue(inputVal, dayIndex) {
    let base = 0;
    for (let d = 0; d < dayIndex; d++) {
      const prevEffective = values[d] + 50;
      const excess = Math.max(0, prevEffective - 50);
      base = (base + excess) * 0.75;
    }
    const currentEffective = values[dayIndex] + 50;
    return Math.max(0, Math.round(base + currentEffective + delightLevel));
  }

  function buildGridLines() {
    const grid = document.getElementById('gridLines');
    grid.innerHTML = '';
    // Create lines every 100 units up to 800
    for (let i = 0; i <= CHART_MAX; i += 100) {
      const line = document.createElement('div');
      line.className = 'grid-line';
      line.style.bottom = (i / CHART_MAX * 100) + '%';
      grid.appendChild(line);
    }
  }

  function buildColumns() {
    const area = document.getElementById('columnsArea');
    days.forEach((day, i) => {
      const col = document.createElement('div');
      col.className = 'day-column';
      col.innerHTML = `
        <div class="bars-area">
          <div class="bar-outer">
            <div class="bar-fill dolled" id="bar-dolled-${i}"></div>
          </div>
          <div class="bar-outer">
            <div class="bar-fill attract" id="bar-attract-${i}"></div>
          </div>
        </div>
        <div class="day-label">${day}</div>
        <div class="slider-wrapper">
          <input type="range" class="day-slider" min="0" max="${MAX_INPUT}" value="0" />
        </div>
      `;
      area.appendChild(col);

      col.querySelector('.day-slider').addEventListener('input', (e) => {
        values[i] = parseInt(e.target.value);
        updateAll();
      });
    });
  }

  function updateAll() {
    for (let i = 0; i < 7; i++) {
      const calcVal = calculateValue(values[i], i);
      const dolledBar = document.getElementById(`bar-dolled-${i}`);
      const attractBar = document.getElementById(`bar-attract-${i}`);
      
      dolledBar.style.height = (values[i] / CHART_MAX * 100) + '%';
      attractBar.style.height = (Math.min(calcVal, CHART_MAX) / CHART_MAX * 100) + '%';
    }
  }

  document.getElementById('delightSlider').addEventListener('input', (e) => {
    delightLevel = parseInt(e.target.value);
    document.getElementById('delightValue').textContent = (delightLevel >= 0 ? '+' : '') + delightLevel;
    updateAll();
  });

  buildGridLines();
  buildColumns();
  updateAll();
</script>

</body>
</html>
