<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbital Gravity Simulator</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;400&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        overflow: hidden;
        font-family: "Exo 2", sans-serif;
        cursor: crosshair;
        user-select: none;
      }

      canvas {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
      }

      /* Emoji layer sits on top of canvas but below UI */
      #emoji-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .emoji-sprite {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
        line-height: 1;
        text-align: center;
        will-change: transform;
      }

      #ui-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        pointer-events: none;
        z-index: 10;
      }

      #title {
        font-family: "Orbitron", sans-serif;
        color: #4fc3f7;
        font-size: 18px;
        letter-spacing: 4px;
        text-transform: uppercase;
        padding: 20px 28px;
        text-shadow: 0 0 20px rgba(79, 195, 247, 0.5);
      }

      #instructions {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.5);
        font-size: 13px;
        letter-spacing: 1.5px;
        text-align: center;
        pointer-events: none;
        z-index: 10;
        transition: opacity 0.5s;
      }

      #instructions span {
        color: #4fc3f7;
        font-weight: 400;
      }

      #stats {
        position: fixed;
        top: 20px;
        right: 28px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 12px;
        letter-spacing: 1px;
        text-align: right;
        pointer-events: none;
        z-index: 10;
        line-height: 1.8;
      }

      #controls {
        position: fixed;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 12px;
        z-index: 10;
        pointer-events: all;
      }

      .btn {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.6);
        padding: 8px 18px;
        font-family: "Exo 2", sans-serif;
        font-size: 12px;
        letter-spacing: 1.5px;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.2s;
        text-transform: uppercase;
      }

      .btn:hover {
        background: rgba(79, 195, 247, 0.1);
        border-color: rgba(79, 195, 247, 0.3);
        color: #4fc3f7;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="emoji-layer"></div>

    <div id="ui-overlay">
      <div id="title">Orbital</div>
    </div>

    <div id="stats"></div>

    <div id="instructions">
      <span>click</span> to place a moon &nbsp;·&nbsp; <span>drag</span> to set
      velocity
    </div>

    <div id="controls">
      <button class="btn" onclick="clearMoons()">Clear</button>
      <button class="btn" onclick="toggleTrails()">Trails</button>
      <button class="btn" onclick="togglePause()">Pause</button>
    </div>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const statsEl = document.getElementById("stats");
      const emojiLayer = document.getElementById("emoji-layer");

      let W, H;
      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      // Physics constants
      const G = 800;
      const EARTH_MASS = 5000;
      const EARTH_RADIUS = 36;
      const MOON_RADIUS = 6;

      // ── DOM Emoji Sprite System ──
      // All emoji are rendered as positioned DOM elements over the canvas.
      // The browser's native text renderer handles emoji perfectly on iOS/Android/desktop.

      function createEmojiSprite(emoji, sizePx) {
        const el = document.createElement("div");
        el.className = "emoji-sprite";
        el.textContent = emoji;
        el.style.fontSize = sizePx + "px";
        emojiLayer.appendChild(el);
        return el;
      }

      function positionSprite(el, x, y) {
        el.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
      }

      function removeSprite(el) {
        if (el && el.parentNode) el.parentNode.removeChild(el);
      }

      // ── State ──
      let moons = [];
      let stars = [];
      let placing = null;
      let showTrails = true;
      let paused = false;
      let explosions = [];
      let impacts = [];

      // Earth sprite (created once)
      const earthEl = createEmojiSprite("🌍", Math.round(EARTH_RADIUS * 2.2));

      // Pre-generate stars
      function generateStars() {
        stars = [];
        for (let i = 0; i < 300; i++) {
          stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.4 + 0.2,
            brightness: Math.random() * 0.5 + 0.2,
            twinkleSpeed: Math.random() * 0.02 + 0.005,
            twinkleOffset: Math.random() * Math.PI * 2,
          });
        }
      }
      generateStars();
      window.addEventListener("resize", generateStars);

      // Moon colors
      const moonColors = [
        "#e0e0e0",
        "#b0bec5",
        "#ffcc80",
        "#ce93d8",
        "#80cbc4",
        "#ef9a9a",
        "#a5d6a7",
        "#90caf9",
        "#fff59d",
        "#f48fb1",
      ];
      let colorIndex = 0;

      // ── Input Handling ──
      canvas.addEventListener("mousedown", (e) => {
        if (e.button !== 0) return;
        if (!placing) placing = { x: e.clientX, y: e.clientY };
      });

      canvas.addEventListener("mouseup", (e) => {
        finishPlacing(e.clientX, e.clientY);
      });

      canvas.addEventListener(
        "touchstart",
        (e) => {
          e.preventDefault();
          const t = e.touches[0];
          if (!placing) placing = { x: t.clientX, y: t.clientY };
        },
        { passive: false },
      );

      canvas.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
          const t = e.touches[0];
          mouseX = t.clientX;
          mouseY = t.clientY;
        },
        { passive: false },
      );

      canvas.addEventListener(
        "touchend",
        (e) => {
          e.preventDefault();
          const t = e.changedTouches[0];
          finishPlacing(t.clientX, t.clientY);
        },
        { passive: false },
      );

      function finishPlacing(x, y) {
        if (!placing) return;

        const dx = x - placing.x;
        const dy = y - placing.y;

        const vScale = 0.35;
        const vx = dx * vScale;
        const vy = dy * vScale;

        const color = moonColors[colorIndex % moonColors.length];
        colorIndex++;

        const roll = Math.random();
        let emoji = "🌕";
        if (roll < 0.05) emoji = "☕";
        else if (roll < 0.12) emoji = "🍩";

        const el = createEmojiSprite(emoji, Math.round(MOON_RADIUS * 3));

        moons.push({
          x: placing.x,
          y: placing.y,
          vx,
          vy,
          color,
          emoji,
          el,
          trail: [],
          alive: true,
        });

        placing = null;
      }

      // ── Controls ──
      function clearMoons() {
        for (const m of moons) removeSprite(m.el);
        moons = [];
        for (const imp of impacts) removeSprite(imp.el);
        impacts = [];
        explosions = [];
      }
      function toggleTrails() {
        showTrails = !showTrails;
      }
      function togglePause() {
        paused = !paused;
      }

      // Earth position
      function earthX() {
        return W / 2;
      }
      function earthY() {
        return H / 2;
      }

      // ── Canvas Drawing (effects only — no emoji on canvas) ──

      function drawStars(time) {
        for (const s of stars) {
          const alpha =
            s.brightness +
            Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * 0.15;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.05, alpha)})`;
          ctx.fill();
        }
      }

      function drawEarthEffects(time) {
        const ex = earthX();
        const ey = earthY();

        // Glow
        const gradient = ctx.createRadialGradient(
          ex,
          ey,
          EARTH_RADIUS * 0.8,
          ex,
          ey,
          EARTH_RADIUS * 4,
        );
        gradient.addColorStop(0, "rgba(79, 195, 247, 0.12)");
        gradient.addColorStop(0.5, "rgba(79, 195, 247, 0.03)");
        gradient.addColorStop(1, "rgba(79, 195, 247, 0)");
        ctx.beginPath();
        ctx.arc(ex, ey, EARTH_RADIUS * 4, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();

        // Gravitational field rings
        for (let i = 1; i <= 4; i++) {
          const r = EARTH_RADIUS * 2 * i;
          const alpha = 0.04 / i;
          ctx.beginPath();
          ctx.arc(ex, ey, r, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(79, 195, 247, ${alpha})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        // Position earth DOM sprite
        positionSprite(earthEl, ex, ey + 2);
      }

      function updateExplosions(dt) {
        for (const exp of explosions) {
          exp.age += dt;
          for (const p of exp.particles) {
            p.x += p.vx * dt * 60;
            p.y += p.vy * dt * 60;
            p.vx *= 0.96;
            p.vy *= 0.96;
            p.size *= 0.98;
          }
        }
        explosions = explosions.filter((e) => e.age < 1.5);
      }

      function drawExplosions() {
        for (const exp of explosions) {
          const progress = exp.age / 1.5;

          if (exp.age < 0.15) {
            const flashAlpha = 1 - exp.age / 0.15;
            const flashR = EARTH_RADIUS * 0.6 * (1 - flashAlpha * 0.5);
            const flash = ctx.createRadialGradient(
              exp.x,
              exp.y,
              0,
              exp.x,
              exp.y,
              flashR,
            );
            flash.addColorStop(0, `rgba(255, 255, 200, ${flashAlpha})`);
            flash.addColorStop(0.5, `rgba(255, 150, 50, ${flashAlpha * 0.6})`);
            flash.addColorStop(1, "transparent");
            ctx.beginPath();
            ctx.arc(exp.x, exp.y, flashR, 0, Math.PI * 2);
            ctx.fillStyle = flash;
            ctx.fill();
          }

          for (const p of exp.particles) {
            const alpha = Math.max(0, 1 - progress);
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.3, p.size), 0, Math.PI * 2);
            ctx.fillStyle =
              p.color +
              Math.floor(alpha * 255)
                .toString(16)
                .padStart(2, "0");
            ctx.fill();
          }

          if (exp.age < 0.5) {
            const ringProgress = exp.age / 0.5;
            const ringR = EARTH_RADIUS * 1.5 * ringProgress;
            const ringAlpha = 0.4 * (1 - ringProgress);
            ctx.beginPath();
            ctx.arc(exp.x, exp.y, ringR, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 180, 50, ${ringAlpha})`;
            ctx.lineWidth = 2 * (1 - ringProgress);
            ctx.stroke();
          }
        }
      }

      function drawPlacingArrow(mouseX, mouseY) {
        if (!placing) return;

        const sx = placing.x;
        const sy = placing.y;

        ctx.beginPath();
        ctx.arc(sx, sy, MOON_RADIUS + 2, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
        ctx.lineWidth = 1;
        ctx.stroke();

        const dx = mouseX - sx;
        const dy = mouseY - sy;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len < 5) return;

        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(mouseX, mouseY);
        ctx.strokeStyle = "rgba(79, 195, 247, 0.6)";
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.stroke();
        ctx.setLineDash([]);

        const angle = Math.atan2(dy, dx);
        const aLen = 10;
        ctx.beginPath();
        ctx.moveTo(mouseX, mouseY);
        ctx.lineTo(
          mouseX - aLen * Math.cos(angle - 0.4),
          mouseY - aLen * Math.sin(angle - 0.4),
        );
        ctx.moveTo(mouseX, mouseY);
        ctx.lineTo(
          mouseX - aLen * Math.cos(angle + 0.4),
          mouseY - aLen * Math.sin(angle + 0.4),
        );
        ctx.strokeStyle = "rgba(79, 195, 247, 0.8)";
        ctx.lineWidth = 2;
        ctx.stroke();

        const speed = (len * 0.35).toFixed(1);
        ctx.font = '11px "Exo 2", sans-serif';
        ctx.fillStyle = "rgba(79, 195, 247, 0.7)";
        ctx.textAlign = "center";
        ctx.fillText(`v = ${speed}`, (sx + mouseX) / 2, (sy + mouseY) / 2 - 12);
      }

      function drawMoonEffects() {
        const ex = earthX();
        const ey = earthY();

        for (const moon of moons) {
          if (!moon.alive) continue;

          // Trail
          if (showTrails && moon.trail.length > 1) {
            ctx.beginPath();
            ctx.moveTo(moon.trail[0].x, moon.trail[0].y);
            for (let i = 1; i < moon.trail.length; i++) {
              ctx.lineTo(moon.trail[i].x, moon.trail[i].y);
            }
            ctx.strokeStyle = moon.color + "30";
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }

          // Glow
          const glow = ctx.createRadialGradient(
            moon.x,
            moon.y,
            0,
            moon.x,
            moon.y,
            MOON_RADIUS * 3,
          );
          glow.addColorStop(0, moon.color + "20");
          glow.addColorStop(1, "transparent");
          ctx.beginPath();
          ctx.arc(moon.x, moon.y, MOON_RADIUS * 3, 0, Math.PI * 2);
          ctx.fillStyle = glow;
          ctx.fill();

          // Position DOM sprite
          positionSprite(moon.el, moon.x, moon.y + 1);

          // Gravitational line to earth
          const dx = ex - moon.x;
          const dy = ey - moon.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const lineAlpha = Math.max(0.02, Math.min(0.1, 200 / dist));
          ctx.beginPath();
          ctx.moveTo(moon.x, moon.y);
          ctx.lineTo(ex, ey);
          ctx.strokeStyle = `rgba(79, 195, 247, ${lineAlpha})`;
          ctx.lineWidth = 0.5;
          ctx.setLineDash([2, 6]);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }

      // ── Physics ──
      function updatePhysics(dt) {
        if (paused) return;

        const ex = earthX();
        const ey = earthY();
        const substeps = 4;
        const subDt = dt / substeps;

        for (const moon of moons) {
          if (!moon.alive) continue;

          for (let s = 0; s < substeps; s++) {
            const dx = ex - moon.x;
            const dy = ey - moon.y;
            const distSq = dx * dx + dy * dy;
            const dist = Math.sqrt(distSq);

            if (dist < EARTH_RADIUS + MOON_RADIUS) {
              moon.alive = false;
              removeSprite(moon.el);

              const angle = Math.atan2(moon.y - ey, moon.x - ex);
              const impactX = ex + Math.cos(angle) * EARTH_RADIUS * 0.85;
              const impactY = ey + Math.sin(angle) * EARTH_RADIUS * 0.85;

              const particles = [];
              const speed = Math.sqrt(moon.vx * moon.vx + moon.vy * moon.vy);
              const intensity = Math.min(speed / 3, 8);
              for (let p = 0; p < 30; p++) {
                const a = Math.random() * Math.PI * 2;
                const v = (Math.random() * 2 + 1) * intensity;
                particles.push({
                  x: impactX,
                  y: impactY,
                  vx: Math.cos(a) * v + (Math.random() - 0.5) * 2,
                  vy: Math.sin(a) * v + (Math.random() - 0.5) * 2,
                  color: [
                    "#ff6d00",
                    "#ffab00",
                    "#ffd600",
                    "#ff3d00",
                    "#ffffff",
                  ][Math.floor(Math.random() * 5)],
                  size: Math.random() * 3 + 1,
                });
              }
              explosions.push({ x: impactX, y: impactY, age: 0, particles });

              const impactEl = createEmojiSprite(
                "💥",
                Math.round(MOON_RADIUS * 1.8),
              );
              positionSprite(impactEl, impactX, impactY);
              impacts.push({ x: impactX, y: impactY, el: impactEl });

              break;
            }

            const force = (G * EARTH_MASS) / distSq;
            const ax = (force * dx) / dist;
            const ay = (force * dy) / dist;

            moon.vx += ax * subDt;
            moon.vy += ay * subDt;
            moon.x += moon.vx * subDt;
            moon.y += moon.vy * subDt;
          }

          if (moon.alive) {
            moon.trail.push({ x: moon.x, y: moon.y });
            if (moon.trail.length > 600) moon.trail.shift();
          }
        }

        moons = moons.filter((m) => m.alive);
      }

      // Stats
      function updateStats() {
        const active = moons.length;
        statsEl.innerHTML = `MOONS: ${active}${paused ? " · PAUSED" : ""}`;
      }

      // Mouse tracking
      let mouseX = 0,
        mouseY = 0;
      canvas.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      // ── Main Loop ──
      let lastTime = performance.now();
      function loop(time) {
        const dt = Math.min((time - lastTime) / 1000, 0.05);
        lastTime = time;

        ctx.fillStyle = "#05060f";
        ctx.fillRect(0, 0, W, H);

        drawStars(time / 1000);
        updatePhysics(dt);
        updateExplosions(dt);
        drawEarthEffects(time / 1000);
        drawMoonEffects();
        drawExplosions();
        drawPlacingArrow(mouseX, mouseY);
        updateStats();

        requestAnimationFrame(loop);
      }

      requestAnimationFrame(loop);
    </script>
  </body>
</html>
