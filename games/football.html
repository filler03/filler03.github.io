<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Field Goal Frenzy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Orbitron:wght@700;900&display=swap');

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
overflow: hidden;
background: #0a1628;
font-family: ‘Russo One’, sans-serif;
touch-action: none;
-webkit-user-select: none;
user-select: none;
}

canvas { display: block; }

#ui-overlay {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 10;
}

#scoreboard {
position: absolute;
top: 20px;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 30px;
align-items: center;
}

.score-item {
text-align: center;
color: #e8d5a3;
text-shadow: 0 0 15px rgba(232, 213, 163, 0.5);
}

.score-label {
font-family: ‘Orbitron’, sans-serif;
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
opacity: 0.7;
}

.score-value {
font-family: ‘Orbitron’, sans-serif;
font-size: 36px;
font-weight: 900;
line-height: 1;
}

.score-divider {
width: 2px;
height: 40px;
background: rgba(232, 213, 163, 0.3);
}

#message {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
font-family: ‘Orbitron’, sans-serif;
font-size: 48px;
font-weight: 900;
color: #ffd700;
text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.4);
opacity: 0;
transition: opacity 0.3s;
text-align: center;
}

#message.show { opacity: 1; }

#swipe-hint {
position: absolute;
bottom: 80px;
left: 50%;
transform: translateX(-50%);
color: rgba(232, 213, 163, 0.6);
font-size: 14px;
letter-spacing: 2px;
text-transform: uppercase;
animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
0%, 100% { opacity: 0.4; }
50% { opacity: 1; }
}

#wind-indicator {
position: absolute;
top: 85px;
left: 50%;
transform: translateX(-50%);
color: rgba(150, 200, 255, 0.8);
font-size: 12px;
letter-spacing: 2px;
display: flex;
align-items: center;
gap: 8px;
}

#wind-arrow {
font-size: 18px;
transition: transform 0.5s;
}

#distance-info {
position: absolute;
top: 110px;
left: 50%;
transform: translateX(-50%);
color: rgba(232, 213, 163, 0.5);
font-size: 11px;
letter-spacing: 2px;
}

.streak-fire {
color: #ff4500 !important;
text-shadow: 0 0 20px rgba(255, 69, 0, 0.8) !important;
}

#power-meter {
position: absolute;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
width: 200px;
height: 6px;
background: rgba(255,255,255,0.1);
border-radius: 3px;
overflow: hidden;
opacity: 0;
transition: opacity 0.2s;
}

#power-fill {
height: 100%;
width: 0%;
background: linear-gradient(90deg, #4CAF50, #FFC107, #F44336);
border-radius: 3px;
transition: width 0.05s;
}
</style>

</head>
<body>

<div id="ui-overlay">
  <div id="scoreboard">
    <div class="score-item">
      <div class="score-label">Score</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <div class="score-label">Streak</div>
      <div class="score-value" id="streak">0</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <div class="score-label">Kicks</div>
      <div class="score-value" id="kicks">0</div>
    </div>
  </div>

  <div id="wind-indicator">
    <span>WIND</span>
    <span id="wind-arrow">➤</span>
    <span id="wind-speed">0 mph</span>
  </div>

  <div id="distance-info" >30 YARD KICK</div>

  <div id="message"></div>
  <div id="swipe-hint">⬆ Swipe Up to Kick ⬆</div>

  <div id="power-meter">
    <div id="power-fill"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ============================================
// FIELD GOAL FRENZY - 3D Football Kicking Game
// ============================================

const STATE = {
  READY: 'ready',
  KICKING: 'kicking',
  FLYING: 'flying',
  RESULT: 'result'
};

let scene, camera, renderer, clock;
let football, goalPost, field;
let gameState = STATE.READY;
let score = 0, streak = 0, kicks = 0, bestStreak = 0;
let swipeStart = null, swipeStartTime = 0;
let ballVelocity = new THREE.Vector3();
let ballSpin = new THREE.Vector3();
let windForce = new THREE.Vector2(0, 0);
let currentDistance = 30;
let particles = [];
let grassBlades = [];
let crowdNoise = null;

// DOM refs
const scoreEl = document.getElementById('score');
const streakEl = document.getElementById('streak');
const kicksEl = document.getElementById('kicks');
const messageEl = document.getElementById('message');
const hintEl = document.getElementById('swipe-hint');
const windArrow = document.getElementById('wind-arrow');
const windSpeed = document.getElementById('wind-speed');
const distInfo = document.getElementById('distance-info');
const powerMeter = document.getElementById('power-meter');
const powerFill = document.getElementById('power-fill');

// ---- INIT ----
function init() {
  scene = new THREE.Scene();
  clock = new THREE.Clock();

  // Sky gradient
  scene.background = new THREE.Color(0x1a3a5c);
  scene.fog = new THREE.FogExp2(0x2a4a6c, 0.004);

  // Camera
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 2.5, 8);
  camera.lookAt(0, 5, -40);

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.appendChild(renderer.domElement);

  createLights();
  createField();
  createGoalPost();
  createFootball();
  createStadium();
  createSkyDome();
  setWind();

  // Events
  renderer.domElement.addEventListener('mousedown', onSwipeStart);
  renderer.domElement.addEventListener('mousemove', onSwipeMove);
  renderer.domElement.addEventListener('mouseup', onSwipeEnd);
  renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });
  renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: false });
  renderer.domElement.addEventListener('touchend', onTouchEnd, { passive: false });
  window.addEventListener('resize', onResize);

  animate();
}

// ---- LIGHTS ----
function createLights() {
  const ambient = new THREE.AmbientLight(0x4466aa, 0.4);
  scene.add(ambient);

  const hemi = new THREE.HemisphereLight(0x87ceeb, 0x2d5a27, 0.6);
  scene.add(hemi);

  // Stadium floodlights
  const positions = [[-30, 35, -20], [30, 35, -20], [-30, 35, -60], [30, 35, -60]];
  positions.forEach(pos => {
    const light = new THREE.SpotLight(0xfff5e0, 1.5, 150, Math.PI / 4, 0.5, 1);
    light.position.set(...pos);
    light.target.position.set(0, 0, -40);
    light.castShadow = true;
    light.shadow.mapSize.width = 1024;
    light.shadow.mapSize.height = 1024;
    scene.add(light);
    scene.add(light.target);

    // Light pole
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.8 });
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 36, 8), poleMat);
    pole.position.set(pos[0], 18, pos[2]);
    scene.add(pole);

    // Light housing
    const housing = new THREE.Mesh(new THREE.BoxGeometry(3, 1.5, 2), new THREE.MeshStandardMaterial({ color: 0x333333 }));
    housing.position.set(pos[0], 35, pos[2]);
    scene.add(housing);

    // Glow
    const glow = new THREE.Mesh(
      new THREE.PlaneGeometry(5, 5),
      new THREE.MeshBasicMaterial({ color: 0xfff5e0, transparent: true, opacity: 0.3, side: THREE.DoubleSide })
    );
    glow.position.set(pos[0], 34, pos[2]);
    glow.lookAt(0, 0, -40);
    scene.add(glow);
  });

  // Key light on ball
  const keyLight = new THREE.DirectionalLight(0xffeedd, 0.8);
  keyLight.position.set(5, 20, 10);
  keyLight.castShadow = true;
  scene.add(keyLight);
}

// ---- FIELD ----
function createField() {
  // Main field
  const fieldGeo = new THREE.PlaneGeometry(80, 160, 80, 160);
  const fieldMat = new THREE.MeshStandardMaterial({
    color: 0x2d7a2d,
    roughness: 0.9,
    metalness: 0.0,
  });

  // Vertex color striping
  const colors = [];
  const pos = fieldGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const z = pos.getZ(i);
    const stripe = Math.floor((z + 80) / 10) % 2;
    const base = stripe === 0 ? 0.18 : 0.22;
    colors.push(0.1, base + Math.random() * 0.02, 0.1);
  }
  fieldGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  fieldMat.vertexColors = true;

  field = new THREE.Mesh(fieldGeo, fieldMat);
  field.rotation.x = -Math.PI / 2;
  field.position.set(0, 0, -40);
  field.receiveShadow = true;
  scene.add(field);

  // Yard lines
  for (let i = 0; i <= 10; i++) {
    const lineGeo = new THREE.PlaneGeometry(53.3 * 0.3, 0.15);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
    const line = new THREE.Mesh(lineGeo, lineMat);
    line.rotation.x = -Math.PI / 2;
    line.position.set(0, 0.01, -i * 9.14 + 5);
    scene.add(line);

    // Yard numbers
    if (i > 0 && i < 10) {
      const num = i <= 5 ? i * 10 : (10 - i) * 10;
      // Hash marks
      [-8, 8].forEach(x => {
        const hash = new THREE.Mesh(
          new THREE.PlaneGeometry(0.8, 0.1),
          lineMat
        );
        hash.rotation.x = -Math.PI / 2;
        hash.position.set(x, 0.01, -i * 9.14 + 5);
        scene.add(hash);
      });
    }
  }

  // End zone
  const ezGeo = new THREE.PlaneGeometry(80, 18);
  const ezMat = new THREE.MeshStandardMaterial({ color: 0x8B0000, roughness: 0.9 });
  const endzone = new THREE.Mesh(ezGeo, ezMat);
  endzone.rotation.x = -Math.PI / 2;
  endzone.position.set(0, 0.005, -95);
  scene.add(endzone);

  // Sidelines
  [-9, 9].forEach(x => {
    const sideline = new THREE.Mesh(
      new THREE.PlaneGeometry(0.1, 100),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 })
    );
    sideline.rotation.x = -Math.PI / 2;
    sideline.position.set(x, 0.01, -40);
    scene.add(sideline);
  });
}

// ---- GOAL POST ----
function createGoalPost() {
  goalPost = new THREE.Group();
  const postMat = new THREE.MeshStandardMaterial({
    color: 0xf5d742,
    metalness: 0.7,
    roughness: 0.2,
    emissive: 0xf5d742,
    emissiveIntensity: 0.1
  });

  const postRadius = 0.12;

  // Two ground posts
  [-2.87, 2.87].forEach(x => {
    const upright = new THREE.Mesh(new THREE.CylinderGeometry(postRadius, postRadius, 6, 12), postMat);
    upright.position.set(x, 3, 0);
    upright.castShadow = true;
    goalPost.add(upright);
  });

  // Crossbar
  const crossbar = new THREE.Mesh(new THREE.CylinderGeometry(postRadius, postRadius, 5.74, 12), postMat);
  crossbar.rotation.z = Math.PI / 2;
  crossbar.position.set(0, 3.05, 0);
  crossbar.castShadow = true;
  goalPost.add(crossbar);

  // Uprights extending up
  [-2.87, 2.87].forEach(x => {
    const upright = new THREE.Mesh(new THREE.CylinderGeometry(postRadius * 0.8, postRadius, 12, 12), postMat);
    upright.position.set(x, 9.05, 0);
    upright.castShadow = true;
    goalPost.add(upright);
  });

  // Center post down to ground
  const center = new THREE.Mesh(new THREE.CylinderGeometry(postRadius * 1.2, postRadius * 1.5, 3.05, 12), postMat);
  center.position.set(0, 1.525, 0);
  goalPost.add(center);

  // Curved gooseneck (simplified with angled piece)
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(postRadius, postRadius * 1.2, 3.5, 12), postMat);
  neck.position.set(0, 2, 1.5);
  neck.rotation.x = Math.PI / 5;
  goalPost.add(neck);

  goalPost.position.set(0, 0, -getGoalZ());
  scene.add(goalPost);
}

function getGoalZ() {
  return currentDistance * 0.9144; // yards to meters approx
}

// ---- FOOTBALL ----
function createFootball() {
  const group = new THREE.Group();

  // Football shape: elongated sphere
  const ballGeo = new THREE.SphereGeometry(0.35, 24, 16);
  // Stretch it into football shape
  const positions = ballGeo.attributes.position;
  for (let i = 0; i < positions.count; i++) {
    const y = positions.getY(i);
    const scale = 1 + Math.abs(y) * 0.8;
    positions.setX(i, positions.getX(i) / scale);
    positions.setZ(i, positions.getZ(i) / scale);
    positions.setY(i, y * 1.6);
  }
  ballGeo.computeVertexNormals();

  const ballMat = new THREE.MeshStandardMaterial({
    color: 0x8B4513,
    roughness: 0.6,
    metalness: 0.1,
  });

  const ball = new THREE.Mesh(ballGeo, ballMat);
  ball.castShadow = true;
  ball.rotation.x = Math.PI / 2;
  group.add(ball);

  // Laces
  const laceMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  for (let i = -3; i <= 3; i++) {
    const lace = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.02, 0.02), laceMat);
    lace.position.set(0, i * 0.065, 0.34);
    ball.add(lace);
  }
  // Lace center line
  const laceLine = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.5, 0.02), laceMat);
  laceLine.position.set(0, 0, 0.34);
  ball.add(laceLine);

  // White stripe tips
  const stripeMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
  [0.52, -0.52].forEach(y => {
    const stripe = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.015, 8, 16), stripeMat);
    stripe.position.set(0, y, 0);
    ball.add(stripe);
  });

  football = group;
  football.position.set(0, 0.4, 5);
  scene.add(football);

  // Tee
  const teeMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
  const tee = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.25, 0.15, 16), teeMat);
  tee.position.set(0, 0.075, 5);
  scene.add(tee);
}

// ---- STADIUM ----
function createStadium() {
  const standsMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.8 });
  const crowdColors = [0xcc2222, 0x2244aa, 0xdddddd, 0xffcc00, 0x22aa44];

  // Stadium stands on sides
  [-20, 20].forEach(x => {
    const stands = new THREE.Mesh(new THREE.BoxGeometry(12, 15, 120), standsMat);
    stands.position.set(x, 5, -40);
    scene.add(stands);

    // Crowd dots
    for (let i = 0; i < 300; i++) {
      const dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.2, 4, 4),
        new THREE.MeshBasicMaterial({ color: crowdColors[Math.floor(Math.random() * crowdColors.length)] })
      );
      dot.position.set(
        x + (Math.random() - 0.5) * 10,
        10 + Math.random() * 4,
        -40 + (Math.random() - 0.5) * 100
      );
      scene.add(dot);
    }
  });

  // Back stands behind goal
  const backStands = new THREE.Mesh(new THREE.BoxGeometry(60, 20, 10), standsMat);
  backStands.position.set(0, 8, -110);
  scene.add(backStands);

  for (let i = 0; i < 200; i++) {
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(0.2, 4, 4),
      new THREE.MeshBasicMaterial({ color: crowdColors[Math.floor(Math.random() * crowdColors.length)] })
    );
    dot.position.set(
      (Math.random() - 0.5) * 50,
      15 + Math.random() * 6,
      -108 + Math.random() * 3
    );
    scene.add(dot);
  }
}

// ---- SKY ----
function createSkyDome() {
  const skyGeo = new THREE.SphereGeometry(200, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      topColor: { value: new THREE.Color(0x0a1628) },
      bottomColor: { value: new THREE.Color(0x2a4a6c) },
    },
    vertexShader: `
      varying vec3 vWorldPos;
      void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 topColor;
      uniform vec3 bottomColor;
      varying vec3 vWorldPos;
      void main() {
        float h = normalize(vWorldPos).y;
        gl_FragColor = vec4(mix(bottomColor, topColor, max(h, 0.0)), 1.0);
      }
    `
  });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  scene.add(sky);

  // Stars
  const starGeo = new THREE.BufferGeometry();
  const starVerts = [];
  for (let i = 0; i < 500; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI * 0.4;
    const r = 190;
    starVerts.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.cos(phi),
      r * Math.sin(phi) * Math.sin(theta)
    );
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0.6 });
  scene.add(new THREE.Points(starGeo, starMat));
}

// ---- PARTICLES ----
function spawnParticles(pos, color, count, spread) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.05 + Math.random() * 0.08, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    p.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * spread,
      Math.random() * spread * 0.7,
      (Math.random() - 0.5) * spread
    );
    p.userData.life = 1;
    p.userData.decay = 0.01 + Math.random() * 0.02;
    scene.add(p);
    particles.push(p);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.userData.vel.y -= 5 * dt;
    p.position.add(p.userData.vel.clone().multiplyScalar(dt));
    p.userData.life -= p.userData.decay;
    p.material.opacity = p.userData.life;
    if (p.userData.life <= 0) {
      scene.remove(p);
      particles.splice(i, 1);
    }
  }
}

// ---- WIND ----
function setWind() {
  const angle = Math.random() * Math.PI * 2;
  const strength = Math.random() * 5 + 1;
  windForce.set(Math.cos(angle) * strength, Math.sin(angle) * strength);
  windArrow.style.transform = `rotate(${-angle * 180 / Math.PI + 90}deg)`;
  windSpeed.textContent = `${strength.toFixed(1)} mph`;
}

// ---- SWIPE INPUT ----
function getClientPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onSwipeStart(e) {
  if (gameState !== STATE.READY) return;
  const pos = getClientPos(e);
  swipeStart = pos;
  swipeStartTime = performance.now();
  powerMeter.style.opacity = '1';
}

function onSwipeMove(e) {
  if (!swipeStart || gameState !== STATE.READY) return;
  const pos = getClientPos(e);
  const dy = swipeStart.y - pos.y;
  const power = Math.min(dy / 200, 1);
  powerFill.style.width = `${Math.max(power * 100, 0)}%`;
}

function onSwipeEnd(e) {
  if (!swipeStart || gameState !== STATE.READY) return;
  const endPos = e.changedTouches ? { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY } : { x: e.clientX, y: e.clientY };
  const dx = endPos.x - swipeStart.x;
  const dy = swipeStart.y - endPos.y;
  const elapsed = (performance.now() - swipeStartTime) / 1000;

  powerMeter.style.opacity = '0';
  powerFill.style.width = '0%';

  if (dy > 30) {
    kick(dx, dy, elapsed);
  }
  swipeStart = null;
}

function onTouchStart(e) { e.preventDefault(); onSwipeStart(e); }
function onTouchMove(e) { e.preventDefault(); onSwipeMove(e); }
function onTouchEnd(e) { e.preventDefault(); onSwipeEnd(e); }

// ---- KICK ----
function kick(dx, dy, elapsed) {
  gameState = STATE.FLYING;
  hintEl.style.display = 'none';
  kicks++;
  kicksEl.textContent = kicks;

  const speed = Math.min(dy / (elapsed * 100), 1.5);
  const power = Math.min(speed * 1.2, 1.4);
  const angle = -dx / 400;

  const goalZ = getGoalZ();
  const flightSpeed = 18 + power * 22;

  ballVelocity.set(
    angle * flightSpeed * 0.3,
    flightSpeed * 0.45,
    -flightSpeed
  );

  ballSpin.set(
    (Math.random() - 0.5) * 3,
    angle * 5,
    -10
  );

  // Kick particles
  spawnParticles(football.position.clone(), 0x4CAF50, 15, 3);

  // Camera follow setup
  camera.userData.following = true;
}

// ---- BALL PHYSICS ----
function updateBall(dt) {
  if (gameState !== STATE.FLYING) return;

  const gravity = -15;
  const drag = 0.995;
  const windStr = 0.08;

  ballVelocity.y += gravity * dt;
  ballVelocity.x += windForce.x * windStr * dt;
  ballVelocity.z += windForce.y * windStr * dt;

  ballVelocity.multiplyScalar(drag);

  football.position.add(ballVelocity.clone().multiplyScalar(dt));
  football.rotation.x += ballSpin.x * dt;
  football.rotation.y += ballSpin.y * dt;
  football.rotation.z += ballSpin.z * dt;

  // Camera smooth follow
  const camTarget = new THREE.Vector3(
    football.position.x * 0.3,
    Math.max(football.position.y * 0.5 + 2, 3),
    football.position.z + 12
  );
  camera.position.lerp(camTarget, dt * 2);
  camera.lookAt(football.position.x, football.position.y + 2, football.position.z - 10);

  // Check goal
  const goalZ = -getGoalZ();
  if (football.position.z <= goalZ && football.position.z >= goalZ - 2) {
    checkGoal();
  }

  // Ground hit
  if (football.position.y < 0.3 && football.position.z < 0) {
    football.position.y = 0.3;
    if (Math.abs(ballVelocity.y) > 1) {
      ballVelocity.y *= -0.3;
      ballVelocity.x *= 0.7;
      ballVelocity.z *= 0.7;
      spawnParticles(football.position.clone(), 0x4a7a3a, 5, 1);
    } else {
      missResult();
    }
  }

  // Out of bounds
  if (football.position.z < goalZ - 20 || Math.abs(football.position.x) > 25 || football.position.y < -5) {
    missResult();
  }
}

function checkGoal() {
  const bx = football.position.x;
  const by = football.position.y;

  const isGood = Math.abs(bx) < 2.87 && by > 3.05 && by < 15;

  if (isGood) {
    goodKick();
  } else if (by < 3.05 || Math.abs(bx) > 3.5) {
    // Hit post or under crossbar
    if (Math.abs(bx) > 2.5 && Math.abs(bx) < 3.3 && by > 2.5) {
      // Post hit
      ballVelocity.x *= -0.5;
      ballVelocity.z *= -0.3;
      spawnParticles(football.position.clone(), 0xf5d742, 20, 3);
    }
  }
}

function goodKick() {
  gameState = STATE.RESULT;
  score += 3;
  streak++;
  if (streak > bestStreak) bestStreak = streak;

  scoreEl.textContent = score;
  streakEl.textContent = streak;

  if (streak >= 3) {
    streakEl.classList.add('streak-fire');
  }

  const msgs = ['GOOD!', 'IT\'S GOOD!', 'RIGHT DOWN THE MIDDLE!', 'PERFECT KICK!', '3 POINTS!'];
  const msg = streak >= 5 ? '🔥 ON FIRE! 🔥' : streak >= 3 ? '🔥 ' + msgs[Math.floor(Math.random() * msgs.length)] : msgs[Math.floor(Math.random() * msgs.length)];
  showMessage(msg, '#FFD700');

  spawnParticles(football.position.clone(), 0xFFD700, 40, 5);
  spawnParticles(football.position.clone(), 0xFFFFFF, 20, 3);

  // Increase difficulty
  if (streak % 3 === 0 && currentDistance < 60) {
    currentDistance += 5;
  }

  setTimeout(resetKick, 2000);
}

function missResult() {
  if (gameState !== STATE.FLYING) return;
  gameState = STATE.RESULT;
  streak = 0;
  streakEl.textContent = 0;
  streakEl.classList.remove('streak-fire');

  const msgs = ['NO GOOD!', 'WIDE!', 'MISSED IT!', 'OFF TARGET!'];
  showMessage(msgs[Math.floor(Math.random() * msgs.length)], '#FF4444');

  spawnParticles(football.position.clone(), 0xFF4444, 10, 2);

  currentDistance = 30;
  setTimeout(resetKick, 2000);
}

function showMessage(text, color) {
  messageEl.textContent = text;
  messageEl.style.color = color;
  messageEl.style.textShadow = `0 0 30px ${color}80, 0 0 60px ${color}40`;
  messageEl.classList.add('show');
  setTimeout(() => messageEl.classList.remove('show'), 1500);
}

function resetKick() {
  gameState = STATE.READY;

  football.position.set(0, 0.4, 5);
  football.rotation.set(0, 0, 0);
  ballVelocity.set(0, 0, 0);
  ballSpin.set(0, 0, 0);

  // Reset camera
  camera.userData.following = false;

  goalPost.position.set(0, 0, -getGoalZ());
  distInfo.textContent = `${currentDistance} YARD KICK`;

  setWind();
  hintEl.style.display = 'block';
}

// ---- CAMERA RESET ----
function updateCamera(dt) {
  if (gameState === STATE.READY) {
    const targetPos = new THREE.Vector3(0, 2.5, 8);
    camera.position.lerp(targetPos, dt * 3);
    const lookTarget = new THREE.Vector3(0, 5, -40);
    camera.lookAt(lookTarget);

    // Subtle idle sway
    const t = clock.getElapsedTime();
    camera.position.x += Math.sin(t * 0.5) * 0.02;
    camera.position.y += Math.cos(t * 0.3) * 0.01;
  }
}

// ---- IDLE FOOTBALL ANIMATION ----
function updateIdleBall(dt) {
  if (gameState !== STATE.READY) return;
  const t = clock.getElapsedTime();
  football.position.y = 0.4 + Math.sin(t * 2) * 0.02;
  football.rotation.y = Math.sin(t * 0.5) * 0.1;
}

// ---- RESIZE ----
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ---- MAIN LOOP ----
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  updateBall(dt);
  updateCamera(dt);
  updateIdleBall(dt);
  updateParticles(dt);

  renderer.render(scene, camera);
}

// ---- START ----
init();
</script>

</body>
